; Copy this file to ../wifi_credentials.ini or configs/wifi_credentials.ini.
; The real credentials file is ignored by git.
;
; Multiple networks are supported. At runtime the firmware scans all configured
; SSIDs and tries the access point with the best RSSI first.

[wifi:home]
ssid = IoT_SmartHome
password = change-me

[wifi:backup]
ssid = IoT_Backup
password = change-me-too
